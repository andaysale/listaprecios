  INSTRUCCIONES PARA ACTIVAR SINCRONIZACIÓN EN LA NUBE (Firebase)
  ═══════════════════════════════════════════════════════════════

  PASO 1 — Crear proyecto Firebase (5 min, gratis)
  ─────────────────────────────────────────────────
  1. Ve a https://console.firebase.google.com
  2. Clic en "Agregar proyecto" → ponle un nombre (ej: "bsale-precios")
  3. Desactiva Google Analytics → "Crear proyecto" → "Continuar"

  PASO 2 — Crear base de datos Firestore
  ─────────────────────────────────────────────────
  1. En el menú izquierdo → "Compilación" → "Firestore Database"
  2. "Crear base de datos" → "Comenzar en modo de prueba" → "Siguiente"
  3. Selecciona región "us-central" → "Listo"

  PASO 3 — Obtener credenciales de tu app
  ─────────────────────────────────────────────────
  1. En el menú izquierdo → ícono ⚙️ "Configuración del proyecto"
  2. Baja hasta "Tus apps" → clic en el ícono </> (Web)
  3. Apodo de la app: "precios-bsale" → "Registrar app"
  4. Copia los valores firebaseConfig que aparecen
  5. Pégalos abajo reemplazando los valores de ejemplo

  PASO 4 — Reemplazar valores aquí abajo
  ─────────────────────────────────────────────────
  Busca "TU_API_KEY", "TU_PROJECT_ID", etc. y reemplaza con tus datos.

  PASO 5 — Distribuir el archivo
  ─────────────────────────────────────────────────
  Comparte este archivo HTML con tu equipo. Todos ven los mismos datos.
  Si no hay internet, el programa sigue funcionando con localStorage.
══════════════════════════════════════════════════════════════ -->

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
function getCurrentData(){
 return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
}
function exportExcel(){
 const data=getCurrentData();
 const ws=XLSX.utils.json_to_sheet(data);
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,'Productos');
 XLSX.writeFile(wb,'productos_bsale.xlsx');
}
function importExcel(ev){
 const file=ev.target.files[0];
 if(!file) return;
 const reader=new FileReader();
 reader.onload=(e)=>{
   const wb=XLSX.read(e.target.result,{type:'array'});
   const sheet=wb.Sheets[wb.SheetNames[0]];
   const imported=XLSX.utils.sheet_to_json(sheet);
   data=imported.map((r,i)=>({id:i+1,P:r.P||r.Producto||'',U:r.U||r.UND||'UND',C:parseFloat(r.C||r.Compra)||0,PCT:parseFloat(r.PCT||r.Margen)||0.3,CAT:r.CAT||r.Categoría||'Otros'}));
   nextId=data.length+1;
   localStorage.setItem(STORAGE_KEY,JSON.stringify({data,nextId}));
   if(confirm('Productos importados: '+data.length+'. ¿Guardar en la nube ahora?')){
     saveData().then(()=>location.reload());
   } else { location.reload(); }
 };
 reader.readAsArrayBuffer(file);
}
function bulkUpdate(){
 const pct=parseFloat(prompt('Porcentaje de ajuste. Ej: 10 para subir 10%, -5 para bajar 5%'));
 if(isNaN(pct)) return;
 data=data.map(p=>{
   if(p.C) p.C=Math.round(p.C*(1+pct/100));
   return p;
 });
 applyFilters();
 if(confirm('Actualización masiva aplicada. ¿Guardar en la nube ahora?')){
   saveData();
 } else {
   toast('Cambios listos — presiona Guardar para sincronizar',false);
 }
}

</script>

  // Primero carga desde localStorage (rápido, sin esperar red)
  const saved=tryLoad();
  if(saved&&saved.length>0){
    data=saved;
    nextId=Math.max(...data.map(r=>r.id))+1;
  } else {
    data=RAW.map(r=>({id:nextId++,P:r.P,U:r.U,C:r.C,PCT:r.PCT,CAT:r.CAT}));
  }
  populateCats();applyFilters();
  // Luego sincroniza con Firebase si está disponible
  if(FIREBASE_ENABLED && db) listenFirebase();
}

function tryLoad(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const d=JSON.parse(raw);
    return d.data || d;
  }catch(e){ return null; }
}

// Escucha cambios en tiempo real desde Firebase
function listenFirebase(){
  db.collection('bsale').doc('precios').onSnapshot(doc=>{
    if(doc.exists){
      const remote=doc.data();
      if(remote&&remote.data&&remote.data.length>0){
        // Solo actualiza si los datos remotos son más recientes
        const remoteTs=remote.ts||0;
        const localTs=parseInt(localStorage.getItem(STORAGE_KEY+'_ts')||'0');
        if(remoteTs>=localTs){
          data=remote.data;
          nextId=remote.nextId||1;
          localStorage.setItem(STORAGE_KEY,JSON.stringify({data,nextId}));
          localStorage.setItem(STORAGE_KEY+'_ts',String(remoteTs));
          if(remote.cats&&Array.isArray(remote.cats)&&remote.cats.length){
            CATS=remote.cats;
          }
          populateCats();applyFilters();
        }
      }
    }
  },err=>console.warn('Firebase error:',err));
}

async function saveData(){
  // Guarda en localStorage siempre (funciona sin internet)
  const ts=Date.now();
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({data,nextId}));
    localStorage.setItem(STORAGE_KEY+'_ts',String(ts));
  }catch(e){}

  // Guarda en Firebase si está disponible
  if(FIREBASE_ENABLED && db){
    try{
      await db.collection('bsale').doc('precios').set({
        data:data,
        nextId:nextId,
        cats:CATS,
        ts:ts,
        ultimoGuardado:new Date().toLocaleString('es-CL')
      });
      toast('✅ Guardado en la nube — todos los dispositivos se actualizarán',false);
    }catch(e){
      toast('⚠️ Guardado local (sin acceso a internet): '+e.message,true);
    }
  } else {
    if(FIREBASE_ENABLED){
      toast('⚠️ Guardado localmente (Firebase no disponible)',true);
    } else {
      toast('Guardado localmente ✓ — configura Firebase para sincronizar',false);
    }
  }
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      data=d.data||d;
      nextId=d.nextId||1;
      populateCats();applyFilters();
    }
  }catch(e){}
}

function resetData(){
  if(!confirm('¿Restablecer todos los datos al original? Se perderán los cambios no guardados.'))return;
  nextId=1;
  data=RAW.map(r=>({id:nextId++,P:r.P,U:r.U,C:r.C,PCT:r.PCT,CAT:r.CAT}));
  populateCats();applyFilters();toast('Datos restablecidos',false);
}

function populateCats(){
  const sel=document.getElementById('catFilter');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas las categorías</option>';
  CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  sel.value=cur;
}

function toast(msg,err){
  const el=document.getElementById('save-toast');
  el.textContent=msg;el.className='toast'+(err?' err':'');el.style.display='inline-block';
  setTimeout(()=>{el.style.display='none';},2500);
}

function calc(r){
  const v=r.C*(1+r.PCT);
  const iva=v*0.19;
  return{v,iva,total:v+iva,util:v-r.C};
}

function fmt(n){return Math.round(n).toLocaleString('es-CL');}

function applyFilters(){
  const q=document.getElementById('srch').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const sort=document.getElementById('sortSel').value;
  filtered=data.filter(r=>{
    const mq=!q||(r.P||'').toLowerCase().includes(q)||(r.CAT||'').toLowerCase().includes(q);
    const mc=!cat||r.CAT===cat;
    return mq&&mc;
  });
  if(sort){
    filtered.sort((a,b)=>{
      if(sort==='nombre')return a.P.localeCompare(b.P);
      if(sort==='nombreD')return b.P.localeCompare(a.P);
      if(sort==='compra')return a.C-b.C;
      if(sort==='compraD')return b.C-a.C;
      if(sort==='util')return calc(a).util-calc(b).util;
      if(sort==='utilD')return calc(b).util-calc(a).util;
      return 0;
    });
  }
  page=1;render();
}

function updateField(id,field,val){
  const r=data.find(x=>x.id===id);
  if(!r)return;
  if(field==='P'||field==='U'||field==='CAT'){r[field]=val;const fr=filtered.find(x=>x.id===id);if(fr)fr[field]=val;}
  else{const n=parseFloat(val);if(isNaN(n)||n<0)return;r[field]=n;const fr=filtered.find(x=>x.id===id);if(fr)fr[field]=n;}
  const c=calc(r);
  const row=document.querySelector(`tr[data-id="${id}"]`);
  if(!row)return;
  row.querySelector('.ov').textContent='$'+fmt(c.v);
  row.querySelector('.oi').textContent='$'+fmt(c.iva);
  row.querySelector('.ot').textContent='$'+fmt(c.total);
  const uel=row.querySelector('.ou');
  uel.textContent='$'+fmt(c.util);
  uel.className='num-out ou '+(c.util>=0?'util-pos':'util-neg');
  updateStats();
}

function deleteRow(id){
  if(!confirm('¿Eliminar este producto?'))return;
  data=data.filter(x=>x.id!==id);
  filtered=filtered.filter(x=>x.id!==id);
  if((page-1)*PER>=filtered.length&&page>1)page--;
  render();
}

function showAddModal(){
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-bg"><div class="modal">
    <h3><i class="ti ti-plus" aria-hidden="true"></i> Agregar producto</h3>
    <div class="field"><label>Nombre del producto</label><input id="np" type="text" placeholder="Ej: ACEITE DE OLIVA 1LT"></div>
    <div class="field"><label>Unidad (UND, KG, LT...)</label><input id="nu" type="text" placeholder="UND" value="UND"></div>
    <div class="field"><label>Categoría</label><select id="nc">${CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    <div class="field"><label>Precio de compra ($)</label><input id="ncc" type="number" min="0" placeholder="0"></div>
    <div class="field"><label>% Margen (ej: 30 para 30%)</label><input id="npct" type="number" min="0" step="0.1" placeholder="30"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-info" onclick="addProduct()"><i class="ti ti-check" aria-hidden="true"></i> Agregar</button>
    </div>
  </div></div>`;
}

function closeModal(){document.getElementById('modal-area').innerHTML='';}

function addProduct(){
  const p=(document.getElementById('np').value||'').trim();
  const u=(document.getElementById('nu').value||'UND').trim();
  const cat=document.getElementById('nc').value;
  const c=parseFloat(document.getElementById('ncc').value);
  const pct=parseFloat(document.getElementById('npct').value)/100;
  if(!p){alert('Ingresa el nombre del producto');return;}
  if(isNaN(c)||c<0){alert('Ingresa un precio de compra válido');return;}
  if(isNaN(pct)||pct<0){alert('Ingresa un porcentaje válido');return;}
  const nr={id:nextId++,P:p,U:u,C:c,PCT:pct,CAT:cat};
  data.unshift(nr);
  closeModal();
  document.getElementById('srch').value='';
  document.getElementById('catFilter').value='';
  applyFilters();
  toast('Producto agregado. Recuerda guardar.',false);
}

function exportCSV(){
  const h='Producto,UND,Categoría,Compra,% Margen,Venta,IVA,Total,Utilidad\n';
  const rows=data.map(r=>{const c=calc(r);return`"${r.P}","${r.U}","${r.CAT}",${r.C},${(r.PCT*100).toFixed(1)},${Math.round(c.v)},${Math.round(c.iva)},${Math.round(c.total)},${Math.round(c.util)}`;}).join('\n');
  const blob=new Blob(['\uFEFF'+h+rows],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lista_precios_bsale.csv';a.click();
}

function renderRow(r){
  const c=calc(r);
  const catOpts=CATS.map(x=>`<option value="${x}"${x===r.CAT?'selected':''}>${x.substring(0,14)}</option>`).join('');
  return`<tr data-id="${r.id}">
    <td class="col-del"><button class="del-btn" onclick="deleteRow(${r.id})" aria-label="Eliminar"><i class="ti ti-trash" style="font-size:13px" aria-hidden="true"></i></button></td>
    <td><input class="inp" type="text" value="${r.P.replace(/"/g,'&quot;')}" onchange="updateField(${r.id},'P',this.value)" title="${r.P}"></td>
    <td><input class="inp" type="text" value="${r.U}" onchange="updateField(${r.id},'U',this.value)" style="text-align:center"></td>
    <td><select class="cat-sel" onchange="updateField(${r.id},'CAT',this.value)">${catOpts}</select></td>
    <td><input class="inp inp-num" type="number" value="${r.C}" min="0" onchange="updateField(${r.id},'C',this.value)"></td>
    <td><input class="inp inp-num" type="number" value="${(r.PCT*100).toFixed(1)}" min="0" step="0.1" onchange="updateField(${r.id},'PCT',this.value/100)"></td>
    <td class="num-out ov">$${fmt(c.v)}</td>
    <td class="num-out oi">$${fmt(c.iva)}</td>
    <td class="num-out ot">$${fmt(c.total)}</td>
    <td class="num-out ou ${c.util>=0?'util-pos':'util-neg'}">$${fmt(c.util)}</td>
  </tr>`;
}

function updateStats(){
  const tot=data.reduce((a,r)=>{const c=calc(r);a.u+=c.util;return a;},{u:0});
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total productos</div><div class="stat-val">${data.length.toLocaleString('es-CL')}</div></div>
    <div class="stat"><div class="stat-label">Filtrados</div><div class="stat-val">${filtered.length.toLocaleString('es-CL')}</div></div>
    <div class="stat"><div class="stat-label">Página</div><div class="stat-val">${page}/${Math.ceil(filtered.length/PER)||1}</div></div>
    <div class="stat"><div class="stat-label">Utilidad total</div><div class="stat-val" style="font-size:13px;color:var(--color-text-success)">$${fmt(tot.u)}</div></div>`;
}

function render(){
  const s=(page-1)*PER;
  document.getElementById('tbody').innerHTML=filtered.slice(s,s+PER).map(renderRow).join('');
  renderPag();updateStats();
}

function renderPag(){
  const total=Math.ceil(filtered.length/PER)||1;
  let h=`<span class="pag-info">${filtered.length} productos</span>`;
  if(page>1)h+=`<button onclick="page--;render()">‹ Ant</button>`;
  const s=Math.max(1,page-1),e=Math.min(total,page+2);
  for(let i=s;i<=e;i++)h+=`<button class="${i===page?'active':''}" onclick="page=${i};render()">${i}</button>`;
  if(page<total)h+=`<button onclick="page++;render()">Sig ›</button>`;
  document.getElementById('pag').innerHTML=h;
}

initData();
loadFromStorage();
// Muestra estado de Firebase al usuario
setTimeout(()=>{
  const el=document.getElementById('fb-status');
  if(el){
    if(FIREBASE_ENABLED && db) el.textContent='☁️ Sincronización en la nube activa';
    else if(FIREBASE_ENABLED) el.textContent='⚠️ Firebase configurado pero sin conexión';
    else el.textContent='💾 Modo local (sin sincronización)';
  }
},500);

function exportJSON(){
  const data=localStorage.getItem(STORAGE_KEY)||JSON.stringify(DATA||RAW);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='productos_bsale_respaldo.json';
  a.click();
}
function importJSON(ev){
  const f=ev.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      JSON.parse(e.target.result);
      localStorage.setItem(STORAGE_KEY,e.target.result);
      alert('Respaldo importado correctamente. Se recargará la página.');
      location.reload();
    }catch(err){
      alert('Archivo JSON inválido');
    }
  };
  r.readAsText(f);
}

</script>
